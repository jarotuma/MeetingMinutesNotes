<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Minutes Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-800">Meeting Minutes Notes</h1>
      <p class="mt-2 text-gray-500">Nahraj nahrávku ze schůzky – dostaneš přepis a strukturované shrnutí.</p>
    </div>

    <!-- Upload card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6">
      <label
        id="drop-zone"
        class="flex flex-col items-center justify-center gap-3 border-2 border-dashed border-gray-300 rounded-xl p-10 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-colors"
      >
        <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 16.5v-9m0 0-3 3m3-3 3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.338-2.32 5.75 5.75 0 0 1 1.076 11.095" />
        </svg>
        <span class="text-sm text-gray-500">Přetáhni soubor nebo <span class="text-indigo-600 font-medium">klikni pro výběr</span></span>
        <span class="text-xs text-gray-400">MP3, WAV, M4A, OGG, FLAC, MP4, WEBM</span>
        <input id="file-input" type="file" accept=".mp3,.wav,.m4a,.ogg,.flac,.mp4,.webm" class="hidden" />
      </label>

      <div id="file-name" class="mt-3 text-sm text-center text-gray-500 hidden"></div>

      <button
        id="submit-btn"
        class="mt-4 w-full py-3 px-6 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        disabled
      >
        Zpracovat nahrávku
      </button>
    </div>

    <!-- Progress -->
    <div id="progress" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6 text-center">
      <div class="flex items-center justify-center gap-3">
        <svg class="animate-spin h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <span id="progress-text" class="text-gray-600 font-medium">Zpracovávám nahrávku…</span>
      </div>
      <p class="mt-2 text-sm text-gray-400">Transkripce může chvíli trvat v závislosti na délce záznamu.</p>
    </div>

    <!-- Error -->
    <div id="error-box" class="hidden bg-red-50 border border-red-200 rounded-2xl p-5 mb-6">
      <p class="text-red-700 font-medium">Chyba</p>
      <p id="error-msg" class="text-red-600 text-sm mt-1"></p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden space-y-5">

      <!-- Summary -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Shrnutí schůzky</h2>

        <!-- Klíčové body -->
        <div class="mb-5">
          <h3 class="text-sm font-semibold uppercase tracking-wide text-indigo-600 mb-2">Klíčové body</h3>
          <ul id="klic-body" class="space-y-1 text-gray-700 text-sm list-disc list-inside"></ul>
        </div>

        <!-- Úkoly -->
        <div class="mb-5">
          <h3 class="text-sm font-semibold uppercase tracking-wide text-amber-600 mb-2">Úkoly (Action Items)</h3>
          <ul id="ukoly" class="space-y-1 text-gray-700 text-sm"></ul>
        </div>

        <!-- Rozhodnutí -->
        <div>
          <h3 class="text-sm font-semibold uppercase tracking-wide text-green-600 mb-2">Rozhodnutí</h3>
          <ul id="rozhodnuti" class="space-y-1 text-gray-700 text-sm list-disc list-inside"></ul>
        </div>
      </div>

      <!-- Transcript (collapsible) -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <button
          id="transcript-toggle"
          class="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-gray-50 transition-colors"
        >
          <span class="font-semibold text-gray-800">Přepis (transkripce)</span>
          <svg id="toggle-icon" class="w-5 h-5 text-gray-400 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7"/>
          </svg>
        </button>
        <div id="transcript-body" class="hidden px-6 pb-6">
          <p id="transcript-text" class="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed"></p>
        </div>
      </div>

    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const fileName = document.getElementById('file-name');
    const submitBtn = document.getElementById('submit-btn');
    const progress = document.getElementById('progress');
    const errorBox = document.getElementById('error-box');
    const errorMsg = document.getElementById('error-msg');
    const results = document.getElementById('results');

    function setFile(file) {
      if (!file) return;
      fileName.textContent = file.name;
      fileName.classList.remove('hidden');
      submitBtn.disabled = false;
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('border-indigo-400', 'bg-indigo-50');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('border-indigo-400', 'bg-indigo-50');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-indigo-400', 'bg-indigo-50');
      const file = e.dataTransfer.files[0];
      if (file) {
        fileInput.files = e.dataTransfer.files;
        setFile(file);
      }
    });

    submitBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      // Reset UI
      errorBox.classList.add('hidden');
      results.classList.add('hidden');
      progress.classList.remove('hidden');
      submitBtn.disabled = true;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch('/process', { method: 'POST', body: formData });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || 'Neznámá chyba');
        }

        renderResults(data);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorBox.classList.remove('hidden');
      } finally {
        progress.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    function renderResults(data) {
      const { transcript, summary } = data;

      // Klíčové body
      const klicBody = document.getElementById('klic-body');
      klicBody.innerHTML = (summary.klic_body || [])
        .map(b => `<li>${escHtml(b)}</li>`).join('');

      // Úkoly
      const ukoly = document.getElementById('ukoly');
      ukoly.innerHTML = (summary.ukoly || []).map(u => {
        const kdo = u.kdo && u.kdo !== 'neuvedeno'
          ? `<span class="text-amber-600 font-medium">${escHtml(u.kdo)}</span>: `
          : '';
        return `<li class="flex gap-2"><span class="mt-0.5 text-amber-400">▸</span><span>${kdo}${escHtml(u.co)}</span></li>`;
      }).join('');

      // Rozhodnutí
      const rozhodnuti = document.getElementById('rozhodnuti');
      rozhodnuti.innerHTML = (summary.rozhodnuti || [])
        .map(r => `<li>${escHtml(r)}</li>`).join('');

      // Transcript
      document.getElementById('transcript-text').textContent = transcript;

      results.classList.remove('hidden');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Toggle transcript
    document.getElementById('transcript-toggle').addEventListener('click', () => {
      const body = document.getElementById('transcript-body');
      const icon = document.getElementById('toggle-icon');
      body.classList.toggle('hidden');
      icon.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
    });

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
